name: li_curriculum_table
description: "一款轻盈优雅的跨平台课表应用。"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  rust_lib_li_curriculum_table:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  intl: ^0.20.2
  riverpod: ^3.2.1
  flutter_riverpod: ^3.0.3
  window_manager: ^0.5.1
  dynamic_color: ^1.8.1
  flex_color_scheme: ^8.4.0
  web: ^1.1.1
  flutter_secure_storage: ^10.0.0
  calendar_view: ^2.0.0
  infinite_calendar_view: ^2.11.3
  auto_size_text: ^3.0.0
  pool: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons:
    git:
      url: https://github.com/devmil/flutter_launcher_icons.git
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/models/

msix_config:
  display_name: 🍐课表
  publisher_display_name: fan
  identity_name: company.suite.flutterapp
  msix_version: 1.0.0.0
  logo_path: assets/icon/icon.png
  capabilities: internetClient, location, microphone, webcam
