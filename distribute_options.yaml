output: dist/
variables:
  # FLUTTER_ROOT: ~/fvm/versions/3.16.5
  # PGYER_API_KEY: your api key
releases:
  - name: release
    jobs:
      - name: android-apk
        package:
          platform: android
          target: apk
          build_args:
            target-platform: android-arm,android-arm64,android-x64
            release: true
      - name: ios-ipa
        package:
          platform: ios
          target: ipa
          build_args:
            export-method: ad-hoc
            release: true
      - name: linux-pacman
        package:
          platform: linux
          target: pacman
          build_args:
            release: true
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
          build_args:
            release: true
      - name: linux-deb
        package:
          platform: linux
          target: deb
          build_args:
            release: true
      - name: linux-rpm
        package:
          platform: linux
          target: rpm
          build_args:
            release: true
      - name: linux-zip
        package:
          platform: linux
          target: zip
          build_args:
            release: true
      - name: macos-dmg
        package:
          platform: macos
          target: dmg
          build_args:
            dart-define-from-file: env.json
            release: true
      - name: macos-pkg
        package:
          platform: macos
          target: pkg
          build_args:
            release: true
      - name: macos-zip
        package:
          platform: macos
          target: zip
          build_args:
            release: true
      - name: windows-exe
        package:
          platform: windows
          target: exe
          build_args:
            release: true
      - name: windows-zip
        package:
          platform: windows
          target: zip
          build_args:
            release: true