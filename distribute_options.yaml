output: dist/
artifact_name: "{{name}}-{{build_name}}{{#channel}}-{{channel}}{{/channel}}.{{ext}}"
variables:
releases:
  - name: release
    jobs:
      - name: android-universal-apk
        package:
          platform: android
          target: apk
          channel: universal
          build_args:
            target-platform: android-arm,android-arm64,android-x64
            release: true
      - name: android-arm64-apk
        package:
          platform: android
          target: apk
          channel: arm64
          build_args:
            target-platform: android-arm64
            release: true
      - name: android-arm-apk
        package:
          platform: android
          target: apk
          channel: arm
          build_args:
            target-platform: android-arm
            release: true
      - name: android-x64-apk
        package:
          platform: android
          target: apk
          channel: x64
          build_args:
            target-platform: android-x64
            release: true
      - name: ios-ipa
        package:
          platform: ios
          target: ipa
          build_args:
            export-method: ad-hoc
            release: true
      - name: linux-pacman
        package:
          platform: linux
          target: pacman
          build_args:
            release: true
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
          build_args:
            release: true
      - name: linux-deb
        package:
          platform: linux
          target: deb
          build_args:
            release: true
      - name: linux-rpm
        package:
          platform: linux
          target: rpm
          build_args:
            release: true
      - name: linux-zip
        package:
          platform: linux
          target: zip
          build_args:
            release: true
      - name: macos-dmg
        package:
          platform: macos
          target: dmg
          build_args:
            dart-define-from-file: env.json
            release: true
      - name: macos-pkg
        package:
          platform: macos
          target: pkg
          build_args:
            release: true
      - name: macos-zip
        package:
          platform: macos
          target: zip
          build_args:
            release: true
      - name: windows-exe
        package:
          platform: windows
          target: exe
          build_args:
            release: true
      - name: windows-msix
        package:
          platform: windows
          target: msix
          build_args:
            release: true
      - name: windows-zip
        package:
          platform: windows
          target: zip
          build_args:
            release: true