name: Production Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            job_name: "Android & Linux"
            fastforge_jobs: "android-universal-apk,android-arm64-apk,android-arm-apk,android-x64-apk,linux-pacman,linux-appimage,linux-deb,linux-rpm"
          - os: windows-latest
            job_name: "Windows"
            fastforge_jobs: "windows-exe"
          - os: macos-latest
            job_name: "macOS"
            fastforge_jobs: "macos-dmg,macos-pkg"

    steps:
      - name: Free Disk Space (Ubuntu)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux Build Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libarchive-tools rpm patchelf libfuse2 plocate libsecret-1-dev
          sudo updatedb

      - name: Install AppImageTool
        if: runner.os == 'Linux'
        run: |
          sudo wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Setup Build Env
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: >-
            ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || 
                matrix.os == 'ubuntu-latest' && 'aarch64-linux-android,x86_64-unknown-linux-gnu' || 
                'x86_64-pc-windows-msvc' }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true
      
      - name: Disable SPM (macOS only)
        if: runner.os == 'macOS'
        run: flutter config --no-enable-swift-package-manager

      - name: Install Fastforge & FRB
        run: |
          dart pub global activate fastforge
          rustup component add rustfmt
          cargo install flutter_rust_bridge_codegen
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install macOS Packaging Tools
        if: runner.os == 'macOS'
        run: npm install -g appdmg

      - name: Install Windows Packaging Tools
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
        shell: pwsh

      - name: Codegen
        shell: bash
        run: |
          if [ ! -f env.json ]; then echo "{}" > env.json; fi
          flutter_rust_bridge_codegen generate
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Run Fastforge
        run: fastforge release --name release --jobs ${{ matrix.fastforge_jobs }}

      - name: Build Unsigned iOS IPA
        if: matrix.os == 'macos-latest'
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/*.app Payload/
          zip -vr "li-curriculum-table-unsigned.ipa" Payload
          mkdir -p dist
          mv "li-curriculum-table-unsigned.ipa" dist/
        shell: bash

      - name: Fix Pacman Package
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/fix_pacman.sh
          ./scripts/fix_pacman.sh

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: li-table-${{ matrix.os }}
          path: dist/

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Get version from pubspec
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            all-artifacts/**/*
          body: |
            ## 🎉 New Release: v${{ steps.get_version.outputs.version }}
            
            This is an automated release triggered by a push to the `main` branch.
            
            ### Included Platforms:
            - **Android**: .apk
            - **Windows**: .exe, .msix
            - **macOS**: .dmg, .pkg
            - **Linux**: .deb, .rpm, .pacman, .AppImage
            - **iOS**: Unsigned .ipa (preview)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}