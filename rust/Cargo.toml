[package]
name = "rust_lib_li_curriculum_table"
version = "0.1.0"
edition = "2021"

[features]


[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.12.0"

[profile.release]
opt-level = 3
lto = "fat"
panic = "abort"
debug = false
debug-assertions = false
overflow-checks = false
incremental = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
